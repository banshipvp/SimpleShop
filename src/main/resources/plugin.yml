name: SimpleShop
version: 1.0
main: local.simpleshop.SimpleShopPlugin
api-version: 1.20
author: YourName
description: Shop GUI for buying and selling items
depend: [Vault]
commands:
  shop:
    description: Open the shop GUI
    usage: /shop
  sellall:
    description: Sell all inventory items at shop prices
    usage: /sellall
  shopadd:
    description: Add an item or category to the shop
    usage: /shopadd <material> <category> <buy> <sell> | /shopadd category <id> <icon> [position]
    permission: simpleshop.admin
  shopedit:
    description: Edit an existing shop category
    usage: /shopedit <category> <position|name|icon|tagline|color|remove> <value>
    permission: simpleshop.admin

permissions:
  simpleshop.admin:
    description: Access to /shopadd and /shopedit
    default: op
